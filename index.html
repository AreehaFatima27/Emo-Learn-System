<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="EmoLearn — AI-powered emotion-aware quiz platform. Generate quizzes on any topic, get personalized sentiment analysis, and track your learning progress." />
    <title>EmoLearn — Emotion-Aware AI Learning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style/index.css" />
  </head>
  <body>
    <script>
      (function() {
        const theme = localStorage.getItem('theme') || 'dark';
        if (theme === 'light') {
          document.body.classList.add('light-theme');
        }
      })();
    </script>
    <div id="app"></div>
    <div id="toast-container"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
